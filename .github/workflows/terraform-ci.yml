name: Terraform CI

on:
  push:
    branches:ci yml
    
      - main
  pull_request:
  workflow_dispatch:

jobs:
  terraform-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run custom Terraform check action
        uses: ./.github/actions/terraform-check

  terraform-plan:
    runs-on: ubuntu-latest
    needs: terraform-check

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Plan
        run: terraform plan -input=false -lock=false